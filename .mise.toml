[tasks.container-shell]
description = "Shell in container (without KAS)"
run = """
#!/usr/bin/env bash
set -euo pipefail

mkdir -p "${HOST_SSTATE_DIR}"

KAS_ENV_LOCAL=""
if [[ -f "${PROJECT_DIR}/.kas.env.local" ]]; then
