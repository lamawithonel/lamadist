# SPDX-License-Identifier: Apache-2.0
#
# mise task definitions for LamaDist
# See docs/TOOLING.md for usage information.
#
# All tasks use `usage` specs for shell autocompletion of flags and arguments.
# Run `mise tasks` to list available tasks.

[env]
# Project root (resolved at runtime)
PROJECT_DIR = "{{config_root}}"
KAS_WORK_DIR = "/0"
CONTAINER_IMAGE = "lamawithonel/lamadist-builder:latest"
SSTATE_DIR = "/sstate"

[env.HOST_SSTATE_DIR]
default = "{{config_root}}/.cache/sstate"

# ──────────────────────────────────────────────
# Container engine detection
# ──────────────────────────────────────────────
# Prefer podman; fall back to docker.
[env.CONTAINER_CMD]
default = "podman"

# ──────────────────────────────────────────────
# Build tasks
# ──────────────────────────────────────────────

[tasks.build]
description = "Build images for specified BSP"
usage = '''
flag "--bsp" help="BSP target to build" default="x86_64" {
    choices "x86_64" "orin-nx" "rk1" "soquartz"
}
'''
run = """
#!/usr/bin/env bash
set -euo pipefail

BSP="${usage_bsp:-x86_64}"

KAS_CONFIG="${KAS_WORK_DIR}/kas/main.kas.yml:${KAS_WORK_DIR}/kas/bsp/${BSP}.kas.yml"
KAS_DEBUG="${KAS_WORK_DIR}/kas/extras/debug.kas.yml"

mkdir -p "${HOST_SSTATE_DIR}"

KAS_ENV_LOCAL=""
if [[ -f "${PROJECT_DIR}/.kas.env.local" ]]; then
    KAS_ENV_LOCAL="--env-file ${PROJECT_DIR}/.kas.env.local"
fi

${CONTAINER_CMD} run --rm -it \
    --privileged \
    -v /dev:/dev \
    -v "${HOST_SSTATE_DIR}:${SSTATE_DIR}" \
    -e "SSTATE_DIR=${SSTATE_DIR}" \
    -v "${PROJECT_DIR}:${KAS_WORK_DIR}" \
    -e "KAS_WORK_DIR=${KAS_WORK_DIR}" \
    --env-file "${PROJECT_DIR}/.kas.env" ${KAS_ENV_LOCAL} \
    "${CONTAINER_IMAGE}" \
    --log-level debug build "${KAS_CONFIG}:${KAS_DEBUG}"
"""

[tasks.ci-build]
description = "Build with CI settings (force checkout, update)"
run = """
#!/usr/bin/env bash
set -euo pipefail

BSP="${usage_bsp:-x86_64}"

KAS_CONFIG="${KAS_WORK_DIR}/kas/main.kas.yml:${KAS_WORK_DIR}/kas/bsp/${BSP}.kas.yml"

mkdir -p "${HOST_SSTATE_DIR}"

KAS_ENV_LOCAL=""
if [[ -f "${PROJECT_DIR}/.kas.env.local" ]]; then
    KAS_ENV_LOCAL="--env-file ${PROJECT_DIR}/.kas.env.local"
fi

${CONTAINER_CMD} run --rm -it \
    --privileged \
    -v /dev:/dev \
    -v "${HOST_SSTATE_DIR}:${SSTATE_DIR}" \
    -e "SSTATE_DIR=${SSTATE_DIR}" \
    -v "${PROJECT_DIR}:${KAS_WORK_DIR}" \
    -e "KAS_WORK_DIR=${KAS_WORK_DIR}" \
    --env-file "${PROJECT_DIR}/.kas.env" ${KAS_ENV_LOCAL} \
    "${CONTAINER_IMAGE}" \
    build --force-checkout --update "${KAS_CONFIG}"
"""

[tasks.container]
description = "Build the KAS build container image"
run = """
#!/usr/bin/env bash
set -euo pipefail

${CONTAINER_CMD} build -t "${CONTAINER_IMAGE}" "${PROJECT_DIR}/container/"
"""

# ──────────────────────────────────────────────
# Development tasks
# ──────────────────────────────────────────────

